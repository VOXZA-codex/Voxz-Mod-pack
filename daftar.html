<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Akun Baru - VOXZ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        :root {
            --utama: #6366f1; --bg-gelap: #0f111a; --bg-kartu: #1a1d2b;
            --bg-item: #252836; --teks-putih: #ffffff; --teks-abu: #a8b2d1;
            --batas: #2d3142; --sukses: #10b981; --bahaya: #ef4444; --bulat: 12px;
        }
        body {
            background: var(--bg-gelap); color: var(--teks-putih); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* LOGO RGB */
        .logo-voxz {
            width: 80px; height: 80px; border-radius: 50%; background: var(--bg-kartu);
            display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900;
            position: relative; margin-bottom: 15px;
        }
        .logo-voxz::before {
            content: ''; position: absolute; inset: -3px; border-radius: 50%;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%; z-index: -1; animation: rgb-gerak 20s linear infinite;
        }
        @keyframes rgb-gerak { 0% { background-position: 0 0; } 50% { background-position: 400% 0; } 100% { background-position: 0 0; } }

        .judul { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .sub { font-size: 13px; color: var(--teks-abu); margin-bottom: 30px; }

        .kotak {
            width: 100%; max-width: 400px; background: var(--bg-kartu); border: 1px solid var(--batas);
            border-radius: var(--bulat); padding: 25px;
        }
        .grup-input { margin-bottom: 15px; }
        .label { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; }
        .input {
            width: 100%; padding: 12px 15px; background: var(--bg-item); border: 1px solid var(--batas);
            border-radius: 8px; color: white; font-size: 14px; outline: none;
        }
        .input:focus { border-color: var(--utama); }

        .tombol {
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: 0.2s; margin-top: 5px;
        }
        .tombol-utama { background: var(--utama); color: white; }
        .tombol-utama:hover { background: #4f46e5; }
        .tombol-balik { background: transparent; color: var(--teks-abu); margin-top: 10px; }
        .tombol-balik:hover { color: var(--utama); }

        .pesan { margin-top: 15px; font-size: 13px; text-align: center; line-height: 1.5; }
        .pesan.salah { color: var(--bahaya); }
        .pesan.benar { color: var(--sukses); }
        .tautan { color: var(--utama); text-decoration: none; font-weight: 500; display: inline-block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="logo-voxz">V</div>
<h1 class="judul">Buat Akun Baru</h1>
<p class="sub">Gabung jadi anggota VOXZ Marketplace</p>

<div class="kotak">
    <div class="grup-input">
        <label class="label">Nama Pengguna</label>
        <input type="text" class="input" id="namaBaru" placeholder="Pilih nama unik">
    </div>
    <div class="grup-input">
        <label class="label">Kata Sandi</label>
        <input type="password" class="input" id="sandiBaru" placeholder="Buat sandi aman (min 6 huruf)">
    </div>
    <div class="grup-input">
        <label class="label">Ulangi Kata Sandi</label>
        <input type="password" class="input" id="sandiUlang" placeholder="Tulis ulang sandi di atas">
    </div>

    <button class="tombol tombol-utama" onclick="prosesDaftar()">Daftar Sekarang</button>
    <div class="pesan">
        Sudah punya akun? <a href="login.html" class="tautan">Masuk di sini</a>
    </div>
    <button class="tombol tombol-balik" onclick="window.location.href='index.html'">← Kembali ke Beranda</button>

    <div class="pesan" id="pesanInfo"></div>
</div>

<script>
// === PROSES DAFTAR ===
function prosesDaftar() {
    const nama = document.getElementById('namaBaru').value.trim();
    const sandi = document.getElementById('sandiBaru').value.trim();
    const ulangi = document.getElementById('sandiUlang').value.trim();
    const pesan = document.getElementById('pesanInfo');

    // Cek kolom kosong
    if(!nama || !sandi || !ulangi) {
        pesan.className = "pesan salah";
        pesan.textContent = "⚠️ Isi semua kolom ya!";
        return;
    }

    // Cek panjang sandi
    if(sandi.length < 6) {
        pesan.className = "pesan salah";
        pesan.textContent = "⚠️ Kata sandi minimal 6 huruf/angka!";
        return;
    }

    // Cek sandi sama
    if(sandi !== ulangi) {
        pesan.className = "pesan salah";
        pesan.textContent = "⚠️ Kata sandi tidak cocok!";
        return;
    }

    // Cek nama sudah dipakai
    let daftarAkun = JSON.parse(localStorage.getItem('daftarAkunVoxz') || '[]');
    const ada = daftarAkun.find(a => a.nama === nama);
    if(ada) {
        pesan.className = "pesan salah";
        pesan.textContent = "❌ Nama ini sudah dipakai orang lain!";
        return;
    }

    // Simpan akun baru
    daftarAkun.push({ nama: nama, sandi: sandi });
    localStorage.setItem('daftarAkunVoxz', JSON.stringify(daftarAkun));

    // Berhasil lalu pindah ke login
    pesan.className = "pesan benar";
    pesan.innerHTML = "🎉 Akun berhasil dibuat!<br>Sekarang silakan masuk ya...";
    setTimeout(() => window.location.href = "login.html", 2000);
}
</script>
</body>
</html>
