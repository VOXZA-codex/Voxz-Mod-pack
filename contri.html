<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Addon Otomatis | Voxz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .konten { padding: 80px 20px; max-width: 600px; margin: 0 auto; }
        .kotak { background: var(--abu); padding: 25px; border-radius: 12px; border: 1px solid var(--abu-terang); }
        h2 { text-align: center; color: var(--utama); margin-bottom: 25px; }
        .form-grup { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #ddd; }
        input, select, textarea { width: 100%; padding: 10px 12px; background: var(--abu-terang); border: none; border-radius: 8px; color: white; font-size: 15px; }
        textarea { resize: vertical; min-height: 80px; }
        #status { margin: 15px 0; padding: 12px; border-radius: 8px; display: none; }
        .btn { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: var(--utama); color: #111; }
        .tersembunyi { display: none; }
    </style>
</head>
<body>

<!-- Tombol Menu -->
<button class="menu-toggle" id="menuToggle">☰</button>

<!-- Menu Samping -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>VOXZ MARKET</h2>
    </div>
    <nav class="sidebar-nav">
        <a href="#beranda">• Beranda</a>
        <a href="#koleksi">• Koleksi</a>
        <a href="tentang.html">• Info</a>
        <a href="kontak.html">• Kontak</a>
        <a href="contri.html">• Upload</a>
        <a href="top.html">• Official Team Channel </a>
    </nav>
</div>

<div class="overlay" id="overlay"></div>

<div class="konten">
    <div class="kotak">
        <h2>🔐 Akses Khusus</h2>

        <!-- HALAMAN MASUK -->
        <div id="halamanAkses">
            <div class="form-grup">
                <label>Masukkan Kode Akses</label>
                <input type="password" id="kodeAkses" placeholder="Contoh: gphp_xxxxxxxx" required>
            </div>
            <button class="btn btn-primary" onclick="cekAkses()">✅ Masuk</button>
        </div>

        <!-- HALAMAN ISI DATA -->
        <div id="halamanForm" class="tersembunyi">
            <h2>📝 Tambah Addon Baru</h2>

            <div class="form-grup">
                <label>NAMA ADDON</label>
                <input type="text" id="nama" placeholder="Contoh: Senjata Modern" required>
            </div>

            <div class="form-grup">
                <label>PEMBUAT / UPLOAD BY</label>
                <input type="text" id="pembuat" placeholder="Contoh: Voxz Official" required>
            </div>

            <div class="form-grup">
                <label>KATEGORI</label>
                <select id="kategori">
                    <option value="Add-on">Addon</option>
                    <option value="Texture">Texture</option>
                    <option value="Map">World</option>
                    <option value="Skins">Skin</option>
                </select>
            </div>

            <div class="form-grup">
                <label>LINK GAMBAR</label>
                <input type="url" id="linkGambar" placeholder="https://..." required>
            </div>

            <div class="form-grup">
                <label>LINK DOWNLOAD</label>
                <input type="url" id="linkUnduh" placeholder="https://..." required>
            </div>

            <div class="form-grup">
                <label>UKURAN FILE</label>
                <input type="text" id="ukuran" placeholder="Contoh: 4.2 MB" required>
            </div>

            <div class="form-grup">
                <label>KOMPATIBEL</label>
                <input type="text" id="kompatibel" value="MCPE 1.21 - 1.26+" required>
            </div>

            <div class="form-grup">
                <label>DESKRIPSI</label>
                <textarea id="deskripsi" placeholder="Keterangan..." rows="3">No Captions.</textarea>
            </div>

            <button class="btn btn-primary" onclick="kirimData()">🚀 Simpan & Masukkan ke Daftar</button>

            <div id="status"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
// ⚙️ PENGATURAN
// 🔑 Token akses untuk masuk (cukup ini dimasukkan pengguna)
const KUNCI_AKSES = "gphp_Admin_Uploads_2026";

// 📂 Data repo GitHub kamu
const GITHUB = {
    user: "VOXZA-codex",
    repo: "voxz-mod-pack",
    branch: "main",
    token: "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" // ⬅️ GANTI INI DULU!
};

// Cek akses
function cekAkses() {
    const input = document.getElementById("kodeAkses").value.trim();
    if (!input.startsWith("gphp_") || input !== KUNCI_AKSES) {
        alert("❌ Kode akses salah!");
        return;
    }
    document.getElementById("halamanAkses").style.display = "none";
    document.getElementById("halamanForm").style.display = "block";
}

// Ambil isi file data_addons.js yang sudah ada
async function ambilDataLama() {
    const res = await fetch(`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/data_addons.js?ref=${GITHUB.branch}`, {
        headers: { Authorization: `token ${GITHUB.token}`, Accept: "application/vnd.github.v3+json" }
    });
    if (!res.ok) throw new Error("File data_addons.js tidak ditemukan");
    const data = await res.json();
    const isiAsli = atob(data.content);
    return { isiAsli, sha: data.sha };
}

// Tambah data baru ke dalam file
function tambahDataBaru(isiLama, dataBaru) {
    const pola = /const daftarAddon = \[([\s\S]*)\];/;
    const cocok = isiLama.match(pola);
    if (!cocok) throw new Error("Format file data_addons.js salah");

    const isiBaru = isiLama.replace(pola, `const daftarAddon = [\n${cocok[1].trim()}\n\n${dataBaru}\n];`);
    return isiBaru;
}

// Simpan perubahan ke GitHub
async function simpanKeGitHub(isiBaru, shaLama) {
    const res = await fetch(`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/data_addons.js`, {
        method: "PUT",
        headers: {
            Authorization: `token ${GITHUB.token}`,
            Accept: "application/vnd.github.v3+json",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Tambah addon otomatis dari form",
            content: btoa(isiBaru),
            sha: shaLama,
            branch: GITHUB.branch
        })
    });
    if (!res.ok) throw new Error("Gagal menyimpan ke GitHub");
}

// Jalankan proses lengkap
async function kirimData() {
    const status = document.getElementById("status");
    status.style.display = "block";
    status.style.background = "#2a2f3a";
    status.textContent = "⏳ Sedang memproses...";

    try {
        // Ambil nilai dari form
        const nama = document.getElementById("nama").value.trim();
        const pembuat = document.getElementById("pembuat").value.trim();
        const kategori = document.getElementById("kategori").value;
        const gambar = document.getElementById("linkGambar").value.trim();
        const unduh = document.getElementById("linkUnduh").value.trim();
        const ukuran = document.getElementById("ukuran").value.trim();
        const kompatibel = document.getElementById("kompatibel").value.trim();
        const deskripsi = document.getElementById("deskripsi").value.trim() || "No Captions.";

        if (!nama || !pembuat || !gambar || !unduh || !ukuran) throw new Error("Isi semua kolom yang wajib!");

        // Ambil data lama & hitung ID baru
        const { isiAsli, sha } = await ambilDataLama();
        const daftarCocok = isiAsli.match(/id: (\d+)/g);
        const idBaru = daftarCocok ? daftarCocok.length + 1 : 1;

        // Bentuk data baru sesuai format
        const dataBaru = `  {
    id: ${idBaru},
    nama: "${nama.replace(/"/g, '\\"')}",
    pembuat: "${pembuat.replace(/"/g, '\\"')}",
    kategori: "${kategori}",
    gambar: "${gambar}",
    linkUnduh: "${unduh}",
    kompatibel: "${kompatibel}",
    ukuran: "${ukuran}",
    deskripsi: "${deskripsi.replace(/"/g, '\\"')}"
  },`;

        // Gabungkan & simpan
        const isiFinal = tambahDataBaru(isiAsli, dataBaru);
        await simpanKeGitHub(isiFinal, sha);

        status.style.background = "#1e4620";
        status.textContent = "✅ Berhasil! Data langsung masuk ke data_addons.js";
    } catch (err) {
        status.style.background = "#581818";
        status.textContent = `❌ Gagal: ${err.message}`;
    }
}
</script>

</body>
</html>
