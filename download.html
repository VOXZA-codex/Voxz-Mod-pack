<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Unduhan - VOXZ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        :root {
            --utama: #6366f1; --bg-gelap: #0f111a; --bg-kartu: #1a1d2b;
            --bg-item: #252836; --teks-putih: #ffffff; --teks-abu: #a8b2d1;
            --batas: #2d3142; --sukses: #10b981; --bahaya: #ef4444; --bulat: 12px;
        }

        .wadah-utama {
            padding: 20px 15px 100px; min-height: 100vh; background: var(--bg-gelap);
        }

        /* HEADER DENGAN LOGO */
        .bagian-judul {
            display: flex; align-items: center; gap: 12px; margin-bottom: 25px;
        }
        .logo-kecil {
            width: 40px; height: 40px; border-radius: 50%; background: var(--utama);
            display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: white;
        }
        .judul-halaman { font-size: 22px; font-weight: 700; color: var(--teks-putih); }
        .sub-judul-halaman { font-size: 13px; color: var(--teks-abu); margin-top: 2px; }

        /* KARTU UNDUHAN */
        .kartu-unduh {
            background: var(--bg-kartu); border: 1px solid var(--batas); border-radius: var(--bulat);
            padding: 16px; margin-bottom: 12px; transition: all 0.25s ease;
        }
        .kartu-unduh:hover { border-color: var(--utama); transform: translateY(-2px); }

        .atas-kartu {
            display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;
        }
        .info-file { flex: 1; }
        .nama-file { font-size: 15px; font-weight: 600; color: var(--teks-putih); margin-bottom: 4px; }
        .detail-file { font-size: 12px; color: var(--teks-abu); display: flex; gap: 15px; }
        .detail-file span { display: flex; align-items: center; gap: 4px; }
        .detail-file svg { width: 14px; height: 14px; opacity: 0.7; }

        .label-status {
            font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 20px;
            background: rgba(16, 185, 129, 0.12); color: var(--sukses);
        }

        .tombol-unduh {
            width: 100%; padding: 11px; background: var(--utama); color: white; border: none;
            border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
            text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s; margin-top: 10px;
        }
        .tombol-unduh:hover { background: #4f46e5; }
        .tombol-unduh svg { width: 18px; height: 18px; }

        /* KETIKA KOSONG */
        .kosong {
            text-align: center; padding: 70px 20px; color: var(--teks-abu);
        }
        .kosong svg { width: 70px; height: 70px; margin-bottom: 18px; opacity: 0.4; }
        .kosong h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--teks-putih); }
        .kosong p { font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        .tautan-kembali {
            display: inline-flex; align-items: center; gap: 6px; color: var(--utama);
            text-decoration: none; font-weight: 500; font-size: 14px;
        }
        .tautan-kembali svg { width: 16px; height: 16px; margin: 0; opacity: 1; }
    </style>
</head>
<body>

<div class="wadah-utama">
    <!-- JUDUL DENGAN LOGO VOXZ -->
    <div class="bagian-judul">
        <div class="logo-kecil">V</div>
        <div>
            <h1 class="judul-halaman">Unduhan Saya</h1>
            <p class="sub-judul-halaman">Daftar file yang telah Anda pilih</p>
        </div>
    </div>

    <div id="daftarUnduhan"></div>
</div>

<!-- NAVIGASI BAWAH -->
<nav class="nav-bawah">
    <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        <span>Beranda</span>
    </a>

    <a href="unduhan.html" class="nav-item aktif">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Unduhan</span>
    </a>

    <a href="pengaturan.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.15 1.15 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Pengaturan</span>
    </a>
</nav>

<script>
// Terapkan pengaturan warna global
function ambilPengaturan() {
    const simpanan = localStorage.getItem('pengaturanVoxz');
    if(simpanan) {
        const set = JSON.parse(simpanan);
        if(set.warnaUtama) {
            document.documentElement.style.setProperty('--utama', set.warnaUtama);
        }
    }
}
ambilPengaturan();

// Cek wajib login
function cekWajibLogin() {
    const akun = JSON.parse(localStorage.getItem('akunVoxz') || 'null');
    if(!akun || akun.status !== "login") {
        alert("Silakan masuk ke akun terlebih dahulu untuk mengakses halaman ini");
        window.location.href = "login.html";
    }
}
cekWajibLogin();

// Tampilkan daftar unduhan
function tampilkanDaftar() {
    const wadah = document.getElementById('daftarUnduhan');
    const daftar = JSON.parse(localStorage.getItem('daftarUnduhan') || '[]');

    if(daftar.length === 0) {
        wadah.innerHTML = `
        <div class="kosong">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7,10 12,15 17,10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <h3>Belum Ada Unduhan</h3>
            <p>Anda belum memilih file untuk diunduh.<br>Kembali ke beranda untuk menjelajahi koleksi addon kami.</p>
            <a href="index.html" class="tautan-kembali">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Kembali ke Beranda
            </a>
        </div>
        `;
        return;
    }

    wadah.innerHTML = '';
    daftar.forEach(file => {
        wadah.innerHTML += `
        <div class="kartu-unduh">
            <div class="atas-kartu">
                <div class="info-file">
                    <div class="nama-file">${file.nama}</div>
                    <div class="detail-file">
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                                <polyline points="13,2 13,9 20,9"/>
                            </svg>
                            ${file.ukuran}
                        </span>
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12,6 12,12 16,14"/>
                            </svg>
                            ${file.waktu}
                        </span>
                    </div>
                </div>
                <span class="label-status">Siap</span>
            </div>
            <a href="${file.link}" target="_blank" class="tombol-unduh">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7,10 12,15 17,10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Unduh Lewat MediaFire
            </a>
        </div>
        `;
    });
}

tampilkanDaftar();
</script>

</body>
</html>
