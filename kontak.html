    <style>
        /* ==========================================
           STIL UMUM & NAVIGASI
        ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --gelap-utama: #12141d;
            --abu-sedang: #2a2d3f;
            --abu-terang: #8a8fb0;
            --putih: #e0e3f3;
            --hijau: #2dd4a0;
            --emas: #ffd700;
            --ungu: #7928ca;
        }

        body {
            background: var(--gelap-utama);
            color: var(--putih);
            min-height: 100vh;
        }
        
        .container {
            padding: 80px 20px 100px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==========================================
           STIL KARTU PROFIL RPG
        ========================================== */
        .rpg-kartu-profil {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, #1a1d2b, #25293b);
            border-radius: 18px;
            padding: 40px 25px 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.15);
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        /* Bingkai Hiasan RPG */
        .bingkai-atas, .bingkai-bawah {
            position: absolute;
            left: 15px;
            right: 15px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--emas), transparent);
        }
        .bingkai-atas { top: 10px; }
        .bingkai-bawah { bottom: 10px; }

        /* Wadah Foto Profil */
        .wadah-foto {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid var(--emas);
            padding: 3px;
            background: #1a1d2b;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .foto-rpg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .efek-kilat {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: kilat 4s infinite;
        }

        @keyframes kilat {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        /* Teks Profil */
        .nama-pengembang {
            font-size: 24px;
            color: var(--emas);
            margin: 0 0 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .status-peran {
            font-size: 14px;
            color: var(--hijau);
            margin: 0 0 8px;
            font-weight: 500;
        }

        .deskripsi-kecil {
            font-size: 13px;
            color: var(--abu-terang);
            margin: 0;
        }

        /* Pemisah Bergaya */
        .pemisah-rpg {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }
        .pemisah-rpg .garis {
            flex: 1;
            height: 1px;
            background: rgba(255, 215, 0, 0.3);
        }
        .pemisah-rpg .titik {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--emas);
        }

        /* Tombol Kontak */
        .daftar-kontak {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tombol-kontak {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #2d324a, #3a405f);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tombol-kontak:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border-color: var(--emas);
        }

        .tombol-kontak.wa {
            background: linear-gradient(135deg, #128c7e, #25d366);
        }
        .tombol-kontak.bot {
            background: linear-gradient(135deg, #4a6cf7, var(--ungu));
        }
    </style>
</head>
