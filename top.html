        .konten-bantu {
            padding: 80px 20px;

        .judul-halaman {
            text-align: center;
            color: var(--utama);
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* Gaya tombol/box lebar tapi pendek */
        .kotak-saluran {
            width: 100%;
            background: var(--abu);
            border: 1px solid var(--abu-terang);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--putih);
            transition: 0.2s;
        }

        .kotak-saluran:hover {
            background: var(--abu-terang);
            transform: translateY(-1px);
        }

        .foto-saluran {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--utama);
        }

        .info-saluran h3 {
            font-size: 16px;
            margin: 0;
        }

        .info-saluran p {
            font-size: 13px;
            opacity: 0.7;
            margin: 2px 0 0;
        }
    </style>
</head>
